name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_STELLAR_NETWORK: TESTNET
      NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
      NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
      NEXT_PUBLIC_SOROBAN_CONTRACT_ID: CAQT4K4DWKWK45TR7FPBZFOJXLZAPWZXQGOPQYNIKH5PXOUH52YPNXY7
      NEXT_PUBLIC_POOL_ADDRESS: GBQFOMWQPFJ5FTYXOASSVQOQ2W4XD7MXYGRFDZB7E52VXOW2ZQIGDQEH

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run property-based tests
        run: npm test

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Build Next.js app
        run: npm run build

  contract-test:
    name: Rust/Soroban Contract Tests
    runs-on: ubuntu-latest
    continue-on-error: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run contract unit tests
        run: cargo test --manifest-path contracts/ipon-pay-contract/Cargo.toml

      - name: Build contract WASM
        run: cargo build --target wasm32-unknown-unknown --release --manifest-path contracts/ipon-pay-contract/Cargo.toml
