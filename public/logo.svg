<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" width="200" height="48">
  <!-- Icon mark background -->
  <rect x="4" y="4" width="40" height="40" rx="10" fill="#10b981" fill-opacity="0.15"/>
  <!-- Coin outer ellipse (rim) -->
  <ellipse cx="24" cy="24" rx="14" ry="8" fill="none" stroke="#10b981" stroke-width="1.5"/>
  <!-- Coin inner ellipse -->
  <ellipse cx="24" cy="24" rx="9" ry="5" fill="none" stroke="#10b981" stroke-width="1"/>
  <!-- Coin top arc (3D effect) -->
  <path d="M10 24 Q24 14 38 24" fill="none" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Peso symbol center -->
  <text x="24" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="10" fill="#10b981">₱</text>
  <!-- Wordmark -->
  <text x="52" y="30" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="20" fill="#f0fdf4">Ipon</text>
  <text x="101" y="30" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="20" fill="#10b981">Pay</text>
</svg>
