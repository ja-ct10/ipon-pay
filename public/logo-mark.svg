<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Rounded square background -->
  <rect x="1" y="1" width="46" height="46" rx="12" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-opacity="0.4" stroke-width="1.5"/>
  <!-- Coin outer rim ellipse -->
  <ellipse cx="24" cy="26" rx="14" ry="8" fill="none" stroke="#10b981" stroke-width="1.5"/>
  <!-- Coin top arc -->
  <path d="M10 26 Q24 16 38 26" fill="none" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.7"/>
  <!-- Coin bottom closure -->
  <path d="M10 26 Q24 36 38 26" fill="none" stroke="#10b981" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Coin inner ellipse -->
  <ellipse cx="24" cy="26" rx="8" ry="4.5" fill="none" stroke="#10b981" stroke-width="1"/>
  <!-- Peso symbol -->
  <text x="24" y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="9" fill="#10b981">₱</text>
  <!-- Small upward tick above coin (savings/stacking motif) -->
  <line x1="24" y1="14" x2="24" y2="18" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <polyline points="21,17 24,14 27,17" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.7"/>
</svg>
